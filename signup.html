<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>LaunchCopy — Sign up</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: { primary: { DEFAULT: '#6366F1', dark: '#4F46E5', light: '#EEF2FF' } },
        fontFamily: { sans: ['Inter', 'sans-serif'] }
      }
    }
  }
</script>
<style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50">

<!-- AUTH CARD -->
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-[400px] bg-white border border-gray-200 rounded-xl p-8 shadow-sm">

    <!-- LOGO -->
    <a href="index.html" class="block text-center text-xl font-extrabold text-primary mb-6">LaunchCopy</a>

    <!-- HEADING -->
    <h2 class="text-2xl font-bold text-center text-gray-900">Create your account</h2>
    <p class="text-sm text-gray-600 text-center mt-2 mb-6">Already have an account? <a href="login.html" class="text-primary font-semibold hover:underline">Log in</a></p>

    <!-- FORM -->
    <form class="space-y-4">

      <!-- FULL NAME FIELD -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Full name</label>
        <input type="text" placeholder="Alex Johnson" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
      </div>

      <!-- EMAIL FIELD -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
        <input type="email" placeholder="you@example.com" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
      </div>

      <!-- PASSWORD FIELD -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
        <input type="password" placeholder="••••••••" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
        <p class="text-xs text-gray-500 mt-1">At least 8 characters</p>
      </div>

      <!-- SUBMIT BUTTON -->
      <button type="button" class="bg-primary hover:bg-primary-dark text-white font-semibold w-full py-3 rounded-lg transition">Create account</button>

    </form>

    <!-- DIVIDER -->
    <div class="flex items-center my-6">
      <div class="flex-1 border-t border-gray-200"></div>
      <span class="px-3 text-xs text-gray-400 uppercase">or</span>
      <div class="flex-1 border-t border-gray-200"></div>
    </div>

    <!-- GOOGLE BUTTON -->
    <button type="button" class="border border-gray-300 hover:bg-gray-50 text-gray-800 font-semibold w-full py-3 rounded-lg transition flex items-center justify-center gap-3">
      <span class="w-5 h-5 rounded-full bg-white border border-gray-300 flex items-center justify-center text-sm font-bold text-gray-600">G</span>
      <span>Continue with Google</span>
    </button>

    <!-- FOOTER -->
    <p class="text-xs text-center text-gray-500 mt-6">By signing up, you agree to our <a href="#" class="text-primary hover:underline">Terms</a> and <a href="#" class="text-primary hover:underline">Privacy Policy</a>.</p>

  </div>
</div>

</body>
</html>
