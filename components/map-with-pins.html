<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Map with Pins</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { font-family: 'Inter', sans-serif; }
  #map { height: 500px; }
  .pin-marker {
    width: 36px; height: 36px; line-height: 36px; text-align: center;
    background: #f97316;
    color: #fff;
    border-radius: 9999px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    box-shadow: 0 6px 16px -4px rgba(249,115,22,.6), 0 0 0 4px rgba(255,255,255,.9);
    border: 2px solid #fff;
    font-size: 15px;
  }
  .leaflet-popup-content-wrapper {
    border-radius: 14px;
    font-family: 'Inter', sans-serif;
  }
  .leaflet-popup-content {
    margin: 14px 18px;
  }
  .pop-title { font-weight: 700; color: #111827; font-size: 14px; }
  .pop-meta  { color: #6b7280; font-size: 12px; margin-top: 2px; }
  .pop-cat   {
    display: inline-block; margin-top: 8px;
    background: #fff7ed; color: #9a3412; font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 9999px;
    text-transform: uppercase; letter-spacing: .04em;
  }
</style>
</head>
<body class="bg-gray-50 p-10">

  <div class="max-w-5xl mx-auto">
    <div class="flex items-end justify-between mb-6">
      <div>
        <h1 class="text-3xl font-extrabold text-gray-900">Kyoto Day Tour</h1>
        <p class="text-gray-500 mt-1">A curated 6-stop walking route through historic Kyoto.</p>
      </div>
      <span class="bg-orange-100 text-orange-700 text-xs font-semibold px-3 py-1.5 rounded-full">Saturday, May 09</span>
    </div>

    <div id="map" class="rounded-2xl shadow-xl overflow-hidden border border-gray-200"></div>

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
      <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 flex items-center gap-3">
        <div class="w-11 h-11 rounded-lg bg-orange-100 text-orange-600 flex items-center justify-center text-xl">&#128205;</div>
        <div>
          <div class="text-xs text-gray-500 font-medium">Stops</div>
          <div class="text-lg font-bold text-gray-900">6 places</div>
        </div>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 flex items-center gap-3">
        <div class="w-11 h-11 rounded-lg bg-sky-100 text-sky-600 flex items-center justify-center text-xl">&#128095;</div>
        <div>
          <div class="text-xs text-gray-500 font-medium">Distance</div>
          <div class="text-lg font-bold text-gray-900">7.4 km</div>
        </div>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 flex items-center gap-3">
        <div class="w-11 h-11 rounded-lg bg-purple-100 text-purple-600 flex items-center justify-center text-xl">&#9201;</div>
        <div>
          <div class="text-xs text-gray-500 font-medium">Total time</div>
          <div class="text-lg font-bold text-gray-900">5h 20m</div>
        </div>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 flex items-center gap-3">
        <div class="w-11 h-11 rounded-lg bg-emerald-100 text-emerald-600 flex items-center justify-center text-xl">&#9968;</div>
        <div>
          <div class="text-xs text-gray-500 font-medium">Elevation</div>
          <div class="text-lg font-bold text-gray-900">+184 m</div>
        </div>
      </div>
    </div>
  </div>

<script>
  const map = L.map('map', { zoomControl: true }).setView([35.011, 135.768], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(map);

  const spots = [
    { n: 1, name: "Fushimi Inari Shrine",   time: "08:30", cat: "Shrine",   lat: 34.9671, lng: 135.7727 },
    { n: 2, name: "Tofuku-ji Temple",       time: "10:15", cat: "Temple",   lat: 34.9762, lng: 135.7740 },
    { n: 3, name: "Kiyomizu-dera",          time: "11:30", cat: "Temple",   lat: 34.9949, lng: 135.7850 },
    { n: 4, name: "Gion District",          time: "13:00", cat: "Lunch",    lat: 35.0036, lng: 135.7752 },
    { n: 5, name: "Nijo Castle",            time: "14:45", cat: "Castle",   lat: 35.0142, lng: 135.7481 },
    { n: 6, name: "Kinkaku-ji (Golden Pavilion)", time: "16:30", cat: "Garden", lat: 35.0394, lng: 135.7292 }
  ];

  const latlngs = [];
  spots.forEach(s => {
    const icon = L.divIcon({
      className: '',
      html: `<div class="pin-marker">${s.n}</div>`,
      iconSize: [36, 36],
      iconAnchor: [18, 18]
    });
    const marker = L.marker([s.lat, s.lng], { icon }).addTo(map);
    marker.bindPopup(`
      <div class="pop-title">${s.n}. ${s.name}</div>
      <div class="pop-meta">&#128340; ${s.time}</div>
      <div class="pop-cat">${s.cat}</div>
    `);
    latlngs.push([s.lat, s.lng]);
  });

  L.polyline(latlngs, {
    color: '#f97316',
    weight: 3,
    opacity: 0.85,
    dashArray: '8, 8'
  }).addTo(map);

  map.fitBounds(latlngs, { padding: [40, 40] });
</script>

</body>
</html>
