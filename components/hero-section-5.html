<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Hero Section — Minimal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-white">
  <section class="min-h-screen flex flex-col">
    <header class="max-w-6xl w-full mx-auto px-8 pt-10 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="inline-block h-2.5 w-2.5 rounded-sm bg-black"></span>
        <span class="font-semibold text-sm tracking-tight text-black">Halftone</span>
      </div>
      <nav class="hidden sm:flex items-center gap-8 text-sm text-neutral-500">
        <a href="#" class="hover:text-black">Work</a>
        <a href="#" class="hover:text-black">Studio</a>
        <a href="#" class="hover:text-black">Journal</a>
        <a href="#" class="hover:text-black">Contact</a>
      </nav>
    </header>

    <main class="flex-1 flex items-center">
      <div class="max-w-6xl w-full mx-auto px-8 py-24">
        <div class="max-w-3xl">
          <p class="text-xs uppercase tracking-[0.25em] text-neutral-400 mb-8">— A design studio, est. 2019</p>
          <h1 class="text-3xl sm:text-4xl font-medium tracking-tight text-black leading-[1.25]">
            We help thoughtful brands ship considered, calm, and unmistakably human digital products.
          </h1>
          <div class="mt-12">
            <a href="#" class="inline-flex items-center gap-3 rounded-none bg-black px-7 py-3.5 text-sm font-medium text-white hover:bg-neutral-800 transition">
              Start a project
              <span aria-hidden="true">→</span>
            </a>
          </div>
        </div>
      </div>
    </main>

    <footer class="max-w-6xl w-full mx-auto px-8 pb-10 flex items-center justify-between text-xs text-neutral-400">
      <span>Brooklyn / Lisbon</span>
      <span>© 2026 Halftone</span>
    </footer>
  </section>
</body>
</html>
