<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Form — Multi-step</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-white">
  <section class="max-w-2xl mx-auto px-6 py-16">
    <!-- Stepper -->
    <ol class="flex items-center justify-between gap-3">
      <!-- Step 1 done -->
      <li class="flex-1 flex items-center gap-3">
        <span class="flex h-9 w-9 items-center justify-center rounded-full bg-teal-600 text-white font-semibold shadow-sm">
          <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.7 5.3a1 1 0 010 1.4l-7 7a1 1 0 01-1.4 0l-3-3a1 1 0 111.4-1.4l2.3 2.3 6.3-6.3a1 1 0 011.4 0z" clip-rule="evenodd"/></svg>
        </span>
        <div class="hidden sm:block">
          <div class="text-xs uppercase tracking-wide text-slate-400 font-semibold">Step 1</div>
          <div class="text-sm font-semibold text-slate-700">Account</div>
        </div>
        <div class="flex-1 h-0.5 bg-teal-600"></div>
      </li>
      <!-- Step 2 active -->
      <li class="flex-1 flex items-center gap-3">
        <span class="flex h-9 w-9 items-center justify-center rounded-full bg-teal-600 text-white font-semibold shadow-sm ring-4 ring-teal-100">2</span>
        <div class="hidden sm:block">
          <div class="text-xs uppercase tracking-wide text-teal-600 font-semibold">Step 2</div>
          <div class="text-sm font-semibold text-slate-900">Profile</div>
        </div>
        <div class="flex-1 h-0.5 bg-slate-200"></div>
      </li>
      <!-- Step 3 future -->
      <li class="flex items-center gap-3">
        <span class="flex h-9 w-9 items-center justify-center rounded-full bg-slate-100 text-slate-400 font-semibold">3</span>
        <div class="hidden sm:block">
          <div class="text-xs uppercase tracking-wide text-slate-400 font-semibold">Step 3</div>
          <div class="text-sm font-semibold text-slate-500">Confirm</div>
        </div>
      </li>
    </ol>

    <!-- Progress bar -->
    <div class="mt-6">
      <div class="flex items-center justify-between text-xs font-medium text-slate-500 mb-2">
        <span>2 of 3 complete</span>
        <span class="text-teal-600 font-semibold">66%</span>
      </div>
      <div class="h-1.5 w-full rounded-full bg-slate-100 overflow-hidden">
        <div class="h-full w-2/3 rounded-full bg-teal-500"></div>
      </div>
    </div>

    <!-- Card -->
    <div class="mt-10 rounded-2xl bg-white ring-1 ring-slate-200 p-8 sm:p-10 shadow-sm">
      <h1 class="text-2xl font-bold text-slate-900">Tell us about you</h1>
      <p class="mt-1 text-sm text-slate-500">This helps us personalize your workspace. You can change anything later.</p>

      <form class="mt-8 space-y-6">
        <div>
          <label for="name" class="block text-sm font-medium text-slate-700 mb-1.5">Display name</label>
          <input id="name" type="text" value="Jordan Patel" class="block w-full rounded-lg border-0 ring-1 ring-slate-200 bg-white px-3 py-2.5 text-slate-900 focus:ring-2 focus:ring-teal-500 focus:outline-none">
        </div>

        <div>
          <label for="bio" class="block text-sm font-medium text-slate-700 mb-1.5">Short bio</label>
          <textarea id="bio" rows="4" placeholder="Designer, knitter, dog parent. Currently building tools for small teams." class="block w-full rounded-lg border-0 ring-1 ring-slate-200 bg-white px-3 py-2.5 text-slate-900 placeholder:text-slate-400 focus:ring-2 focus:ring-teal-500 focus:outline-none"></textarea>
          <p class="mt-1.5 text-xs text-slate-400">Up to 280 characters. Markdown supported.</p>
        </div>

        <!-- Avatar upload -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Profile photo</label>
          <div class="flex items-center gap-5">
            <div class="h-16 w-16 rounded-full bg-gradient-to-br from-teal-300 to-cyan-500 flex items-center justify-center text-white font-bold text-xl shadow-sm">JP</div>
            <label for="avatar" class="flex-1 flex flex-col items-center justify-center gap-2 rounded-xl border-2 border-dashed border-slate-300 bg-slate-50 px-6 py-6 text-center cursor-pointer hover:border-teal-400 hover:bg-teal-50/40 transition">
              <svg class="h-6 w-6 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v12m0 0l-4-4m4 4l4-4M4 20h16"/></svg>
              <div class="text-sm">
                <span class="font-semibold text-teal-600">Click to upload</span>
                <span class="text-slate-500"> or drag and drop</span>
              </div>
              <p class="text-xs text-slate-400">PNG, JPG, or GIF up to 5 MB</p>
              <input id="avatar" type="file" class="sr-only">
            </label>
          </div>
        </div>

        <div>
          <label for="website" class="block text-sm font-medium text-slate-700 mb-1.5">Website</label>
          <div class="flex rounded-lg ring-1 ring-slate-200 focus-within:ring-2 focus-within:ring-teal-500 overflow-hidden">
            <span class="inline-flex items-center px-3 bg-slate-50 text-slate-500 text-sm border-r border-slate-200">https://</span>
            <input id="website" type="text" placeholder="jordanpatel.com" class="block w-full border-0 bg-white px-3 py-2.5 text-slate-900 placeholder:text-slate-400 focus:outline-none">
          </div>
        </div>
      </form>

      <div class="mt-10 flex items-center justify-between border-t border-slate-100 pt-6">
        <button class="inline-flex items-center gap-2 rounded-lg border border-slate-300 bg-white px-5 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-50 transition">
          <span aria-hidden="true">←</span> Back
        </button>
        <button class="inline-flex items-center gap-2 rounded-lg bg-teal-600 px-5 py-2.5 text-sm font-semibold text-white hover:bg-teal-700 transition shadow-sm">
          Continue <span aria-hidden="true">→</span>
        </button>
      </div>
    </div>
  </section>
</body>
</html>
