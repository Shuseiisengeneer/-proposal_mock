<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Form — Long vertical</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50">
  <section class="max-w-2xl mx-auto px-6 py-16">
    <div class="text-center mb-10">
      <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-slate-900">Talk to our sales team</h1>
      <p class="mt-3 text-slate-600">Tell us a bit about your team and we'll be in touch within one business day.</p>
    </div>

    <form class="rounded-2xl bg-white p-8 sm:p-10 shadow-sm ring-1 ring-slate-200 space-y-10">
      <!-- Section: Your details -->
      <div>
        <div class="flex items-center gap-3 pb-4 border-b border-slate-100">
          <span class="flex h-7 w-7 items-center justify-center rounded-full bg-indigo-100 text-indigo-700 text-sm font-bold">1</span>
          <h2 class="text-base font-semibold text-slate-900">Your details</h2>
        </div>

        <div class="mt-6 space-y-5">
          <div>
            <label for="fullname" class="block text-sm font-medium text-slate-700 mb-1.5">Full name</label>
            <input id="fullname" type="text" placeholder="Maya Santos" class="block w-full rounded-lg border-0 ring-1 ring-slate-200 bg-white px-3 py-2.5 text-slate-900 placeholder:text-slate-400 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
          </div>
          <div>
            <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Work email</label>
            <input id="email" type="email" placeholder="maya@company.com" class="block w-full rounded-lg border-0 ring-1 ring-slate-200 bg-white px-3 py-2.5 text-slate-900 placeholder:text-slate-400 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
          </div>
          <div>
            <label for="company" class="block text-sm font-medium text-slate-700 mb-1.5">Company</label>
            <input id="company" type="text" placeholder="Acme Corp" class="block w-full rounded-lg border-0 ring-1 ring-slate-200 bg-white px-3 py-2.5 text-slate-900 placeholder:text-slate-400 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
          </div>
          <div>
            <label for="role" class="block text-sm font-medium text-slate-700 mb-1.5">Role</label>
            <select id="role" class="block w-full rounded-lg border-0 ring-1 ring-slate-200 bg-white px-3 py-2.5 text-slate-900 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
              <option>Founder / CEO</option>
              <option>Engineering manager</option>
              <option>Product manager</option>
              <option>Designer</option>
              <option>Operations</option>
              <option>Other</option>
            </select>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="phone" class="block text-sm font-medium text-slate-700 mb-1.5">Phone</label>
              <input id="phone" type="tel" placeholder="+1 (555) 123-4567" class="block w-full rounded-lg border-0 ring-1 ring-slate-200 bg-white px-3 py-2.5 text-slate-900 placeholder:text-slate-400 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>
            <div>
              <label for="country" class="block text-sm font-medium text-slate-700 mb-1.5">Country</label>
              <select id="country" class="block w-full rounded-lg border-0 ring-1 ring-slate-200 bg-white px-3 py-2.5 text-slate-900 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                <option>United States</option>
                <option>Canada</option>
                <option>United Kingdom</option>
                <option>Germany</option>
                <option>Australia</option>
                <option>Brazil</option>
                <option>Japan</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- Section: Your inquiry -->
      <div>
        <div class="flex items-center gap-3 pb-4 border-b border-slate-100">
          <span class="flex h-7 w-7 items-center justify-center rounded-full bg-indigo-100 text-indigo-700 text-sm font-bold">2</span>
          <h2 class="text-base font-semibold text-slate-900">Your inquiry</h2>
        </div>
        <div class="mt-6">
          <label for="message" class="block text-sm font-medium text-slate-700 mb-1.5">How can we help?</label>
          <textarea id="message" rows="5" placeholder="We're a 40-person team evaluating tools for Q3..." class="block w-full rounded-lg border-0 ring-1 ring-slate-200 bg-white px-3 py-2.5 text-slate-900 placeholder:text-slate-400 focus:ring-2 focus:ring-indigo-500 focus:outline-none"></textarea>
        </div>
        <div class="mt-5 flex items-start gap-3">
          <input id="tos" type="checkbox" class="mt-1 h-4 w-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500">
          <label for="tos" class="text-sm text-slate-600">I agree to the <a href="#" class="text-indigo-600 font-medium hover:underline">Terms of Service</a> and <a href="#" class="text-indigo-600 font-medium hover:underline">Privacy Policy</a>.</label>
        </div>
      </div>

      <button type="submit" class="w-full rounded-lg bg-indigo-600 py-3 px-4 text-sm font-semibold text-white hover:bg-indigo-700 transition shadow-sm">
        Send message
      </button>
    </form>
  </section>
</body>
</html>
